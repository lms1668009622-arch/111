        .map-marker {
            position: relative; /* Changed from absolute for Leaflet context */
            width: 20px;
            height: 20px;
            background: #ef4444;
            border: 2px solid white;
            border-radius: 50%;
            /* transform: translate(-50%, -50%); Handled by Leaflet iconAnchor */
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .map-marker::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;

    <header class="main-header">

        <div class="user-profile" style="position: relative;">
            <div class="avatar" onclick="toggleUserDropdown(event)" style="cursor: pointer;">Z</div>
            <div id="userDropdown" style="display:none; position:absolute; right:0; top:36px; background:#1e293b; color:#e2e8f0; min-width:220px; box-shadow:0 2px 8px rgba(0,0,0,0.18); border-radius:6px; z-index:9999; overflow:hidden;">

                <a href="javascript:void(0)" style="display:flex; align-items:center; padding:10px 16px; text-decoration:none; color:inherit; background:rgba(249,115,22,.09);" onclick="switchToZhikong()"><span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#334155;margin-right:8px;font-size:11px;font-weight:bold;flex-shrink:0;">Z</span>指控席</a>
                <a href="javascript:void(0)" style="display:flex; align-items:center; padding:10px 16px; text-decoration:none; color:inherit;" onclick="switchToZhihui()"><span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#334155;margin-right:8px;font-size:11px;font-weight:bold;flex-shrink:0;">Z</span>指挥席</a>
                <a href="javascript:void(0)" style="display:flex; align-items:center; padding:10px 16px; text-decoration:none; color:inherit;" onclick="switchToQingbao()"><span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#334155;margin-right:8px;font-size:11px;font-weight:bold;flex-shrink:0;">Q</span>情报席</a>
                <a href="../ontology-data/index.html" target="_blank" rel="noopener noreferrer" style="display:flex; align-items:center; padding:10px 16px; text-decoration:none; color:inherit; border-top:1px solid #334155;"><span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#3b82f6;margin-right:8px;font-size:11px;flex-shrink:0;"><i class="fas fa-database" style="font-size:10px;color:#fff;"></i></span>本体数据</a>

        <script>
        function toggleUserDropdown(e) { if (e) e.stopPropagation(); var dd = document.getElementById('userDropdown'); if (!dd) return; dd.style.display = (dd.style.display === 'block') ? 'none' : 'block'; }
        function closeUserDropdown() { var dd = document.getElementById('userDropdown'); if (dd) dd.style.display = 'none'; }
        document.addEventListener('mousedown', function(e){ var dd = document.getElementById('userDropdown'); var up = document.querySelector('.user-profile'); if (dd && up && !up.contains(e.target)) dd.style.display = 'none'; });
        function switchToZhikong() { closeUserDropdown(); if (window._isZhihuiSeat || window._isQingbaoSeat) { window.location.href = '../zhikong-seat/monitor_map.html'; return; } }
        function switchToZhihui() { closeUserDropdown(); if (!window._isZhihuiSeat) window.location.href = '../zhihui-seat/index.html'; }
        function switchToQingbao() { closeUserDropdown(); if (!window._isQingbaoSeat) window.location.href = '../qingbao-seat/index.html'; }
        </script>

    <script>
    (function(){
      var params = new URLSearchParams(window.location.search);
      if (params.get('seat') !== 'zhihui') return;
      window._isZhihuiSeat = true;
      document.addEventListener('DOMContentLoaded', function() {
        var titleEl = document.getElementById('seatPageTitle');
        if (titleEl) titleEl.textContent = '指挥席';
        var dd = document.getElementById('userDropdown');
        if (!dd) return;
        var span = dd.querySelector('div span[style*="font-weight:bold"]');
        if (span) span.textContent = '指挥席';
        var links = dd.querySelectorAll('a[onclick*="switchToZhikong"], a[onclick*="switchToZhihui"]');
        links.forEach(function(a) {
          a.style.background = '';
          if (a.textContent.indexOf('指挥席') !== -1) a.style.background = 'rgba(249,115,22,.09)';
        });
      });
    })();
    </script>

        document.addEventListener('DOMContentLoaded', function() {
        if (window.SwarmMapInit) window.SwarmMapInit.init();
        if (window.SwarmMap) window.SwarmMap.init();
        if (window.SwarmDevicePanel) window.SwarmDevicePanel.init();
        if (window.SwarmVoiceControl) window.SwarmVoiceControl.init();
        if (window.SwarmDroneControl) window.SwarmDroneControl.init();
        if (window.SwarmTaskTacticPanel) window.SwarmTaskTacticPanel.init();

        // 底栏：编队通信网络开关
        var commSwitch = document.getElementById('commSwitch');
